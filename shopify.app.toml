name = "WS Wishlist"
handle = "ws-wishlist"
client_id = "da094475fe55fe3ae8e9a3e8a6217348"
application_url = "https://wishlist.wsthemes.com"
embedded = true
extension_directories = [ "extensions/**" ]

[build]
automatically_update_urls_on_dev = true

[auth]
redirect_urls = [
  "https://wishlist.wsthemes.com/api/"
]

[access_scopes]
scopes = "read_products,write_app_proxy,unauthenticated_read_product_listings"
use_legacy_install_flow = false

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app_uninstalled"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://wishlist.wsthemes.com/api/gdpr/customers_data_request"
  customer_deletion_url = "https://wishlist.wsthemes.com/api/gdpr/customers_redact"
  shop_deletion_url = "https://wishlist.wsthemes.com/api/gdpr/shop_redact"

[app_proxy]
url = "/api/proxy_route"
prefix = "apps"
subpath = "page"

[pos]
embedded = false
